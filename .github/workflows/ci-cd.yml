name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  ci-cd:
    uses: 314clay/franklin-infra/.github/workflows/ci-cd.yml@main
    with:
      project_name: output
      db_name: output
      port: "3051"
      health_endpoint: /api/state
      health_url: https://output.claypersonalprojects.cc/api/state
      test_command: python test_output.py
      deploy_path: ~/output
      runtime: python
      schema_file: schema.sql
    secrets:
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
      FRANKLIN_SSH_KEY: ${{ secrets.FRANKLIN_SSH_KEY }}
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
