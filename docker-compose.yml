services:
  output:
    build: .
    container_name: output
    restart: unless-stopped
    network_mode: host
    environment:
      - DATABASE_URL=postgresql://postgres@127.0.0.1:5433/output
      - CS_DATABASE_URL=postgresql://clayarnold@127.0.0.1:5432/connectingservices
      - UPLOAD_DIR=/data/uploads
    volumes:
      - output-uploads:/data/uploads
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3051/api/state"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  output-uploads:
