<div class="item-card" id="item-{{ item.id }}" data-format="progress">
  <div class="item-header">
    {% if item.title %}<h3 class="item-title">{{ item.title }}</h3>{% endif %}
    <div class="item-meta">
      <span class="item-badge">progress</span>
      <span class="item-timestamp" data-ts="{{ item.created_at }}">{{ item.age }}</span>
    </div>
  </div>
  <div class="item-content output-progress">
    {% set pct = item.content.percent | default(0) %}
    {% set status = item.content.status | default('') %}
    <div class="progress-track">
      <div class="progress-fill {% if pct >= 100 %}progress-complete{% endif %}" style="width: {{ pct }}%"></div>
    </div>
    <div class="progress-info">
      <span class="progress-pct">{{ pct }}%</span>
      {% if status %}<span class="progress-status">{{ status }}</span>{% endif %}
    </div>
  </div>
</div>
