<div class="item-card" id="item-{{ item.id }}" data-format="math">
  <div class="item-header">
    {% if item.title %}<h3 class="item-title">{{ item.title }}</h3>{% endif %}
    <div class="item-meta">
      <span class="item-badge">math</span>
      <span class="item-timestamp" data-ts="{{ item.created_at }}">{{ item.age }}</span>
    </div>
  </div>
  <div class="item-content output-math" data-math="{{ item.content.expression }}" data-display="{{ item.content.display | default('block') }}">
  </div>
</div>
