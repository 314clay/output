<div class="item-card" id="item-{{ item.id }}" data-format="diff">
  <div class="item-header">
    {% if item.title %}<h3 class="item-title">{{ item.title }}</h3>{% endif %}
    <div class="item-meta">
      <span class="item-badge">diff</span>
      <span class="item-timestamp" data-ts="{{ item.created_at }}">{{ item.age }}</span>
    </div>
  </div>
  <div class="item-content output-diff" id="diff-{{ item.id }}" data-diff="{{ item.content.diff | e }}">
  </div>
</div>
