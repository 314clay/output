<div class="item-card" id="item-{{ item.id }}" data-format="log">
  <div class="item-header">
    {% if item.title %}<h3 class="item-title">{{ item.title }}</h3>{% endif %}
    <div class="item-meta">
      <span class="item-badge log-badge">log</span>
      <span class="item-timestamp" data-ts="{{ item.created_at }}">{{ item.age }}</span>
    </div>
  </div>
  <div class="item-content output-log" id="log-{{ item.id }}">
    {% for line in item.content.lines %}
      <div class="log-line {{ item.content.level or '' }}">{{ line }}</div>
    {% endfor %}
  </div>
</div>
