<div class="item-card" id="item-{{ item.id }}" data-format="chart">
  <div class="item-header">
    {% if item.title %}<h3 class="item-title">{{ item.title }}</h3>{% endif %}
    <div class="item-meta">
      <span class="item-badge">chart</span>
      <span class="item-timestamp" data-ts="{{ item.created_at }}">{{ item.age }}</span>
    </div>
  </div>
  <div class="item-content output-chart">
    <canvas id="chart-{{ item.id }}" data-chart="{{ item.chart_json }}"></canvas>
  </div>
</div>
